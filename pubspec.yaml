  name: flutter_ocr_scanner
  description: >
    A powerful Flutter OCR scanner package for real-time text recognition
    using camera and gallery images with Google ML Kit support.

  version: 1.0.0

  homepage: https://github.com/flutterbysunny/flutter_ocr_scanner
  repository: https://github.com/flutterbysunny/flutter_ocr_scanner
  issue_tracker: https://github.com/flutterbysunny/flutter_ocr_scanner/issues

  topics:
    - flutter
    - ocr
    - scanner
    - text-recognition
    - mlkit

  environment:
    sdk: ">=3.3.0 <4.0.0"
    flutter: ">=3.22.0"

  dependencies:
    flutter:
      sdk: flutter

    camera: ^0.11.0
    image_picker: ^1.1.2
    google_mlkit_text_recognition: ^0.15.0
    permission_handler: ^11.3.1
    get: ^4.6.6

  dev_dependencies:
    flutter_test:
      sdk: flutter

    flutter_lints: ^6.0.0

  flutter:
    uses-material-design: true

  screenshots:
    - description: OCR Scanner Preview
      path: screenshots/preview.png

  platforms:
    android:
    ios:

  funding:
    - https://github.com/flutterbysunny

